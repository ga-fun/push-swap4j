<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Push_swap Ultimate Debugger - Fixed Edition</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; margin: 0; padding: 20px; display: flex; height: 100vh; box-sizing: border-box; overflow: hidden; }
        .main-layout { display: flex; gap: 20px; width: 100%; height: 100%; box-sizing: border-box; }
        
        .stacks-area { 
            display: flex; gap: 15px; flex-grow: 1; height: calc(100vh - 40px); overflow-y: auto; padding: 10px; 
            border: 3px solid transparent; border-radius: 8px; box-sizing: border-box; transition: 0.3s;
        }
        .success-border { border-color: #2e7d32 !important; box-shadow: inset 0 0 15px rgba(46, 125, 50, 0.2); }
        /* Nouveau style pour le tri circulaire */
        .stack-sorted-loop { border: 2px solid #0277bd !important; border-radius: 4px; }
        
        .stack-container { flex: 1; display: flex; flex-direction: column; min-width: 120px; }
        .stack { border: 1px solid #333; flex-grow: 1; display: flex; flex-direction: column-reverse; background: #151515; border-radius: 4px; padding: 5px; box-sizing: border-box; }
        .element { display: flex; align-items: center; margin: 1px 0; height: 18px; border-radius: 2px; position: relative; background: #222; overflow: hidden; width: 100%; cursor: help; }
        .el-label { position: absolute; left: 5px; z-index: 5; color: white; font-size: 10px; font-weight: bold; text-shadow: 1px 1px 2px #000; }
        .el-bar { height: 100%; transition: width 0.2s ease; z-index: 1; border-radius: 0 2px 2px 0; }

        .sidebar { width: 350px; background: #202020; padding: 20px; border-radius: 8px; display: flex; flex-direction: column; gap: 0; border: 1px solid #333; box-sizing: border-box; height: calc(100vh - 40px); }
        
        .section-padding { padding: 12px 0; }
        .border-bottom { border-bottom: 1px solid #333; }
        .border-top { border-top: 1px solid #333; }

        .setup-group { display: flex; flex-direction: column; gap: 8px; }
        
        .script-section { display: flex; flex-direction: column; flex-grow: 1; min-height: 0; padding-bottom: 12px; }
        .toolbar { display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 4px; }
        #movesDisplay { flex-grow: 1; background: #0a0a0a; border: 1px solid #333; padding: 10px; border-radius: 4px; font-family: 'Consolas', monospace; font-size: 13px; overflow-y: auto; line-height: 2; outline: none; }
        .move-item { color: #555; margin-right: 8px; display: inline-block; cursor: pointer; padding: 0 4px; border-radius: 3px; }
        .move-past { color: #40c4ff; }
        .move-current { color: #fff !important; background: #0277bd !important; font-weight: bold; }

        .footer-info { font-size: 11px; color: #888; display: flex; justify-content: space-between; padding: 8px 0; }
        
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        button { padding: 8px; cursor: pointer; background: #333; color: white; border: 1px solid #444; border-radius: 4px; font-size: 11px; font-weight: bold; transition: 0.2s; }
        button:hover:not(:disabled) { background: #444; }
        button:disabled { opacity: 0.3; cursor: not-allowed; filter: grayscale(1); }
        .op-pa, .op-pb { background: #1b5e20; }
        
        .nav-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 12px; }
        .play-area { display: flex; flex-direction: column; gap: 8px; }
        .speed-control { display: flex; align-items: center; gap: 10px; font-size: 11px; color: #bbb; margin-bottom: 4px; width: 100%; box-sizing: border-box; }
        input[type=range] { flex-grow: 1; accent-color: #e65100; cursor: pointer; height: 6px; margin: 0; padding: 0; }
        .btn-full { background: #e65100; padding: 12px; font-size: 13px; }
        .btn-stop { background: #b71c1c; }
        
        input[type=text], input[type=number] { background: #111; color: #fff; border: 1px solid #444; padding: 6px; border-radius: 4px; }
        .icon-btn { cursor: pointer; font-size: 18px; opacity: 0.6; background: none; border: none; color: white; padding: 0; line-height: 1; }
        .icon-btn:hover { opacity: 1; }
    </style>
</head>
<body>

    <div class="main-layout">
        <div id="visualizer" class="stacks-area">
            <div class="stack-container"><strong>A</strong><div id="stackA" class="stack"></div></div>
            <div class="stack-container"><strong>B</strong><div id="stackB" class="stack"></div></div>
        </div>

        <div class="sidebar">
            <div class="setup-group section-padding border-bottom">
                <input type="text" id="inputStack" placeholder="Numbers (comma or space separated)" oninput="updateSizeFromInput()">
                <div style="display: flex; gap: 5px;">
                    <input type="number" id="randomSize" value="50" style="width: 50px;">
                    <button onclick="initRandom()" style="flex-grow: 1; background: #0d47a1;">RANDOM</button>
                </div>
                <button onclick="initManual()">APPLY / RESET STACKS</button>
            </div>

            <div class="script-section section-padding border-bottom">
                <div class="toolbar">
                    <button class="icon-btn" onclick="copyMoves()" title="Copy list">📋</button>
                    <button class="icon-btn" onclick="clearMoves()" title="Clear list">🗑️</button>
                </div>
                <div id="movesDisplay" contenteditable="true" oninput="syncFromDiv()" onpaste="handlePaste(event)"></div>
                <div class="footer-info">
                    <span id="instrLabel">0 moves</span>
                    <span style="color:#40c4ff">Index: <span id="idxDisplay">0</span></span>
                </div>
            </div>

            <div class="controls section-padding">
                <button onclick="timelineOp('sa')">sa</button><button onclick="timelineOp('sb')">sb</button><button onclick="timelineOp('ss')">ss</button>
                <button class="op-pa" onclick="timelineOp('pa')">pa</button><button class="op-pb" onclick="timelineOp('pb')">pb</button><span></span>
                <button onclick="timelineOp('ra')">ra</button><button onclick="timelineOp('rb')">rb</button><button onclick="timelineOp('rr')">rr</button>
                <button onclick="timelineOp('rra')">rra</button><button onclick="timelineOp('rrb')">rrb</button><button onclick="timelineOp('rrr')">rrr</button>
            </div>

            <div class="play-area section-padding border-top">
                <div class="nav-controls">
                    <button id="btnUndo" onclick="undo()">UNDO</button>
                    <button id="btnNext" onclick="nextStep()">NEXT STEP</button>
                </div>
                <div class="speed-control">
                    <span>Speed</span>
                    <input type="range" id="speedRange" min="1" max="1000" value="100" dir="rtl" oninput="saveSpeed()">
                </div>
                <div style="display: flex; gap: 6px;">
                    <button id="btnPlay" class="btn-full" onclick="runFullAuto()" style="flex: 2;">PLAY AUTO</button>
                    <button id="btnStop" class="btn-full btn-stop" onclick="stopAuto()" disabled style="flex: 1;">STOP</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let a = [], b = [];
        let movesList = [];
        let currentIndex = 0;
        let initialStateString = "";
        let isPlaying = false;
        let maxVal = 1;

        // --- NOUVELLES FONCTIONS DE CALCUL (INFO BULLES & TRI CIRCULAIRE) ---
        
        function isCircularlySorted(stack, ascending = true) {
            if (stack.length <= 1) return true;
            let drops = 0;
            const s = [...stack].reverse(); // On remet dans l'ordre du sommet vers le bas
            for (let i = 0; i < s.length; i++) {
                if (ascending ? s[i] > s[(i + 1) % s.length] : s[i] < s[(i + 1) % s.length]) drops++;
            }
            return drops <= 1;
        }

        function getBestCost(val, srcStack, targetStack, targetIsA) {
            if (targetStack.length === 0) return { total: 0, label: "Direct push" };
            
            // 1. Calcul des distances pour la pile SOURCE (celle où on survole)
            const srcIdx = srcStack.indexOf(val);
            const distSrcTop = srcStack.length - 1 - srcIdx;
            const r_src = distSrcTop;
            const rr_src = (srcIdx + 1) % srcStack.length;

            // 2. Calcul des distances pour la pile CIBLE (où on va insérer)
            const sTarget = [...targetStack].reverse();
            let tIdx = 0;
            let min = Math.min(...sTarget), max = Math.max(...sTarget);
            
            if (targetIsA) {
                if (val < min || val > max) tIdx = sTarget.indexOf(min);
                else { 
                    for (let i = 0; i < sTarget.length; i++) {
                        if (val > sTarget[i] && val < sTarget[(i+1)%sTarget.length]) { 
                            tIdx = (i+1)%sTarget.length; break; 
                        } 
                    } 
                }
            } else {
                if (val < min || val > max) tIdx = sTarget.indexOf(max);
                else { 
                    for (let i = 0; i < sTarget.length; i++) {
                        if (val < sTarget[i] && val > sTarget[(i+1)%sTarget.length]) { 
                            tIdx = (i+1)%sTarget.length; break; 
                        } 
                    } 
                }
            }
            const r_target = tIdx;
            const rr_target = (sTarget.length - tIdx) % sTarget.length;

            // 3. Attribution des noms corrects (ra/rb) selon la direction
            const ra = targetIsA ? r_target : r_src;
            const rra = targetIsA ? rr_target : rr_src;
            const rb = targetIsA ? r_src : r_target;
            const rrb = targetIsA ? rr_src : rr_target;

            // 4. Calcul des 4 stratégies
            const strategy = [
                { total: Math.max(ra, rb), label: `RR (ra:${ra}, rb:${rb})` },
                { total: Math.max(rra, rrb), label: `RRR (rra:${rra}, rrb:${rrb})` },
                { total: ra + rrb, label: `Mix (ra:${ra}, rrb:${rrb})` },
                { total: rra + rb, label: `Mix (rra:${rra}, rb:${rb})` }
            ];
            
            return strategy.reduce((prev, curr) => (curr.total < prev.total) ? curr : prev);
        }

        function getSnapshotValue(index) {
            // On recréé l'état exact à l'index donné
            const cleanInput = initialStateString.replace(/,/g, ' ');
            const nums = cleanInput.trim().split(/\s+/).filter(x => x !== "").map(Number);
            let sA = [...nums].reverse();
            let sB = [];

            // On exécute jusqu'à l'index du push
            for (let i = 0; i < index; i++) {
                let type = movesList[i].toLowerCase();
                if (type === 'sa' && sA.length > 1) [sA[sA.length-1], sA[sA.length-2]] = [sA[sA.length-2], sA[sA.length-1]];
                else if (type === 'sb' && sB.length > 1) [sB[sB.length-1], sB[sB.length-2]] = [sB[sB.length-2], sB[sB.length-1]];
                else if (type === 'ss') { 
                    if (sA.length > 1) [sA[sA.length-1], sA[sA.length-2]] = [sA[sA.length-2], sA[sA.length-1]];
                    if (sB.length > 1) [sB[sB.length-1], sB[sB.length-2]] = [sB[sB.length-2], sB[sB.length-1]];
                }
                else if (type === 'pa' && sB.length > 0) sA.push(sB.pop());
                else if (type === 'pb' && sA.length > 0) sB.push(sA.pop());
                else if (type === 'ra' && sA.length > 1) sA.unshift(sA.pop());
                else if (type === 'rb' && sB.length > 1) sB.unshift(sB.pop());
                else if (type === 'rr') { 
                    if (sA.length > 1) sA.unshift(sA.pop());
                    if (sB.length > 1) sB.unshift(sB.pop());
                }
                else if (type === 'rra' && sA.length > 1) sA.push(sA.shift());
                else if (type === 'rrb' && sB.length > 1) sB.push(sB.shift());
                else if (type === 'rrr') {
                    if (sA.length > 1) sA.push(sA.shift());
                    if (sB.length > 1) sB.push(sB.shift());
                }
            }

            // Le push va déplacer l'élément qui est AU SOMMET (dernier de l'array)
            let move = movesList[index].toLowerCase();
            if (move === 'pa') return sB.length > 0 ? sB[sB.length - 1] : "Pile B vide";
            if (move === 'pb') return sA.length > 0 ? sA[sA.length - 1] : "Pile A vide";
            return null;
        }

        // --- FIN DES NOUVELLES FONCTIONS ---

        function saveToLocal() {
            localStorage.setItem('ps_stack', initialStateString);
            localStorage.setItem('ps_moves', JSON.stringify(movesList));
            localStorage.setItem('ps_index', currentIndex);
            saveSpeed();
        }

        function saveSpeed() {
            localStorage.setItem('ps_speed', document.getElementById('speedRange').value);
        }

        function loadFromLocal() {
            initialStateString = localStorage.getItem('ps_stack') || "";
            document.getElementById('inputStack').value = initialStateString;
            updateSizeFromInput();
            const savedSpeed = localStorage.getItem('ps_speed');
            if (savedSpeed) document.getElementById('speedRange').value = savedSpeed;
            try {
                movesList = JSON.parse(localStorage.getItem('ps_moves')) || [];
                currentIndex = parseInt(localStorage.getItem('ps_index')) || 0;
            } catch(e) { movesList = []; currentIndex = 0; }
            render(true);
        }

        function updateSizeFromInput() {
            const val = document.getElementById('inputStack').value;
            const count = val.replace(/,/g, ' ').trim().split(/\s+/).filter(x => x !== "").length;
            document.getElementById('randomSize').value = count;
        }

        function render(forceRedrawList = false) {
            const cleanInput = initialStateString.replace(/,/g, ' ');
            const nums = cleanInput.trim().split(/\s+/).filter(x => x !== "").map(Number);
            maxVal = nums.length > 0 ? Math.max(...nums.map(Math.abs)) : 1;
            a = [...nums].reverse(); b = [];

            for (let i = 0; i < currentIndex; i++) {
                if(movesList[i]) executePhysics(movesList[i]);
            }

            drawStack(a, 'stackA'); drawStack(b, 'stackB');
            checkSuccess();
            updateSidebar(forceRedrawList);
            updateButtonStates();
            saveToLocal();
        }

        function updateButtonStates() {
            document.getElementById('btnUndo').disabled = (currentIndex === 0 || isPlaying);
            document.getElementById('btnNext').disabled = (currentIndex >= movesList.length || isPlaying);
            document.getElementById('btnPlay').disabled = (currentIndex >= movesList.length || isPlaying);
            document.getElementById('btnStop').disabled = !isPlaying;
        }

        function checkSuccess() {
            const vis = document.getElementById('visualizer');
            const isSorted = a.every((val, i) => i === 0 || val < a[i-1]);
            if (b.length === 0 && isSorted && a.length > 0) vis.classList.add('success-border');
            else vis.classList.remove('success-border');
        }

        function drawStack(stack, id) {
            const div = document.getElementById(id); div.innerHTML = '';
            const isA = (id === 'stackA');
            const targetStack = isA ? b : a;
            const targetSorted = isCircularlySorted(targetStack, !isA);
            
            stack.forEach(val => {
                const el = document.createElement('div'); el.className = 'element';
                if (!isPlaying) {
                    const best = targetSorted ? getBestCost(val, stack, targetStack, !isA) : null;
                    el.title = best ? `Valeur: ${val}\nStratégie: ${best.label}\nCoût total: ${best.total}` : `Valeur: ${val}`;
                }
                const label = document.createElement('span'); label.className = 'el-label'; label.innerText = val;
                const bar = document.createElement('div'); bar.className = 'el-bar';
                const widthPercent = maxVal !== 0 ? (Math.abs(val) / maxVal) * 100 : 0;
                bar.style.width = widthPercent + '%';
                bar.style.backgroundColor = `hsl(${200 + (widthPercent * 1.2)}, 70%, 50%)`;
                el.appendChild(label); el.appendChild(bar); div.appendChild(el);
            });
            // Mise à jour du liseré bleu
            div.parentElement.classList.toggle('stack-sorted-loop', isCircularlySorted(stack, isA));
        }

        function updateSidebar(force = false, smoothScroll = true) {
            document.getElementById('idxDisplay').innerText = currentIndex;
            document.getElementById('instrLabel').innerText = `${movesList.length} moves`;
            const display = document.getElementById('movesDisplay');
            
            if (document.activeElement !== display || force) {
                display.innerHTML = '';
                movesList.forEach((m, i) => {
                    const span = document.createElement('span');
                    span.className = "move-item";
                    if (i === currentIndex - 1) span.classList.add("move-current");
                    else if (i < currentIndex) span.classList.add("move-past");
                    span.innerText = m;
                    span.onclick = () => { if(!isPlaying) { display.blur(); jumpTo(i + 1); } };
                    
                    span.onmouseenter = () => {
                        if (isPlaying) return;
                        const mLower = m.toLowerCase();
                        const isPush = (mLower === 'pa' || mLower === 'pb');
                        
                        // Calcul du coût depuis le push précédent
                        let rot = 0, swp = 0;
                        let lookback = i - 1;
                        while (lookback >= 0 && movesList[lookback].toLowerCase() !== 'pa' && movesList[lookback].toLowerCase() !== 'pb') {
                            const cmd = movesList[lookback].toLowerCase();
                            if (['ra','rb','rr','rra','rrb','rrr'].includes(cmd)) rot++;
                            if (['sa','sb','ss'].includes(cmd)) swp++;
                            lookback--;
                        }

                        if (isPush) {
                            const val = getSnapshotValue(i);
                            span.title = `Nombre poussé: ${val}\n----\nCoût depuis dernier push:\nRotations: ${rot}\nSwaps: ${swp}`;
                        } else if (i === movesList.length - 1) {
                            // Pour le tout dernier mouvement s'il n'est pas un push
                            const cmd = mLower;
                            if (['ra','rb','rr','rra','rrb','rrr'].includes(cmd)) rot++;
                            if (['sa','sb','ss'].includes(cmd)) swp++;
                            span.title = `Mouvements finaux:\nRotations: ${rot}\nSwaps: ${swp}`;
                        }
                    };
                    display.appendChild(span);
                });

                if (smoothScroll) {
                    const current = display.querySelector('.move-current');
                    if (current) current.scrollIntoView({ behavior: 'auto', block: 'nearest' });
                }
            }
        }

        function executePhysics(type) {
            type = type.toLowerCase();
            if (type === 'sa' && a.length > 1) [a[a.length-1], a[a.length-2]] = [a[a.length-2], a[a.length-1]];
            else if (type === 'sb' && b.length > 1) [b[b.length-1], b[b.length-2]] = [b[b.length-2], b[b.length-1]];
            else if (type === 'ss') { executePhysics('sa'); executePhysics('sb'); }
            else if (type === 'pa' && b.length > 0) a.push(b.pop());
            else if (type === 'pb' && a.length > 0) b.push(a.pop());
            else if (type === 'ra' && a.length > 1) a.unshift(a.pop());
            else if (type === 'rb' && b.length > 1) b.unshift(b.pop());
            else if (type === 'rr') { executePhysics('ra'); executePhysics('rb'); }
            else if (type === 'rra' && a.length > 1) a.push(a.shift());
            else if (type === 'rrb' && b.length > 1) b.push(b.shift());
            else if (type === 'rrr') { executePhysics('rra'); executePhysics('rrb'); }
        }

        function initManual() { 
            initialStateString = document.getElementById('inputStack').value; 
            currentIndex = 0; 
            render(true); 
            document.getElementById('movesDisplay').scrollTo(0,0);
        }
        function initRandom() {
            const size = parseInt(document.getElementById('randomSize').value) || 20;
            let arr = Array.from({length: size}, (_, i) => i + 1).sort(() => Math.random() - 0.5);
            initialStateString = arr.join(' ');
            document.getElementById('inputStack').value = initialStateString;
            movesList = []; currentIndex = 0; render(true);
            document.getElementById('movesDisplay').scrollTo(0,0);
        }

        function jumpTo(index) { currentIndex = index; render(true); }
        function timelineOp(op) { if(isPlaying) return; movesList = movesList.slice(0, currentIndex); movesList.push(op); currentIndex++; render(true); }
        function undo() { if (currentIndex > 0) { currentIndex--; render(true); } }
        function nextStep() { if (currentIndex < movesList.length) { currentIndex++; render(true); } }
        function stopAuto() { isPlaying = false; }

        let lastScrollTime = 0;

        async function runFullAuto() {
            isPlaying = true;
            updateButtonStates();
            while (currentIndex < movesList.length && isPlaying) {
                const speedSetting = parseInt(document.getElementById('speedRange').value);
                let batchSize = 1;
                if (speedSetting < 100) {
                    batchSize = Math.floor(Math.max(1, (101 - speedSetting) * 1.5));
                }
                for (let i = 0; i < batchSize && currentIndex < movesList.length; i++) {
                    currentIndex++;
                    executePhysics(movesList[currentIndex - 1]);
                }
                drawStack(a, 'stackA');
                drawStack(b, 'stackB');
                const now = Date.now();
                const shouldScroll = (now - lastScrollTime > 100);
                updateSidebar(true, shouldScroll);
                if (shouldScroll) lastScrollTime = now;
                if (speedSetting > 10) {
                    await new Promise(r => setTimeout(r, speedSetting));
                } else {
                    await new Promise(r => requestAnimationFrame(r));
                }
            }
            isPlaying = false;
            checkSuccess();
            updateButtonStates();
        }

        function syncFromDiv() {
            const text = document.getElementById('movesDisplay').innerText.replace(/,/g, ' ');
            movesList = text.trim().split(/\s+/).filter(x => x !== "");
            if (currentIndex > movesList.length) currentIndex = movesList.length;
            render(false);
        }

        function handlePaste(event) {
            event.preventDefault();
            const text = (event.clipboardData || window.clipboardData).getData('text').replace(/,/g, ' ');
            document.execCommand("insertHTML", false, text);
            syncFromDiv();
        }

        function copyMoves() { navigator.clipboard.writeText(movesList.join(' ')); }
        function clearMoves() { movesList = []; currentIndex = 0; render(true); }

        window.onload = loadFromLocal;
    </script>
</body>
</html>
